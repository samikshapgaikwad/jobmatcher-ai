services:
  # Matching API
  - type: web
    name: jobmatch-matching-api
    runtime: python
    rootDir: matching_api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: RETRIEVAL_TOP_K
        value: "20"
      - key: CONFIDENCE_THRESHOLD
        value: "0.5"
      - key: MAX_RETRIES
        value: "2"
    healthCheckPath: /health

  # Embedding Service
  - type: web
    name: jobmatch-embedding-service
    runtime: python
    rootDir: embedding_service
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: "all-MiniLM-L6-v2"
      - key: BATCH_INTERVAL_MINUTES
        value: "5"
      - key: CORS_ORIGINS
        value: "*"
    healthCheckPath: /health

  # Scraper Service
  - type: web
    name: jobmatch-scraper-service
    runtime: python
    rootDir: scraper_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: PIPELINE_RUN_TIME
        value: "02:00"
      - key: CORS_ORIGINS
        value: "*"
    healthCheckPath: /health
