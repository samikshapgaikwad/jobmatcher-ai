services:
  - type: web
    name: jobmatch-scraper-service
    runtime: docker
    dockerfilePath: ./scraper_service/Dockerfile
    dockerContext: ./scraper_service
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: PIPELINE_RUN_TIME
        value: "02:00"
      - key: CORS_ORIGINS
        value: "*"
