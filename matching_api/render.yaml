services:
  - type: web
    name: jobmatch-matching-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: RETRIEVAL_TOP_K
        value: "20"
      - key: CONFIDENCE_THRESHOLD
        value: "0.5"
      - key: MAX_RETRIES
        value: "2"