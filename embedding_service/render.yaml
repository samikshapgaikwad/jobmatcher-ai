services:
  - type: web
    name: jobmatch-embedding-service
    runtime: docker
    dockerfilePath: ./embedding_service/Dockerfile
    dockerContext: ./embedding_service
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: "all-MiniLM-L6-v2"
      - key: BATCH_INTERVAL_MINUTES
        value: "5"
      - key: PIPELINE_RUN_TIME
        value: "02:00"
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"